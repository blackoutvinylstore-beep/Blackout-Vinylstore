        <div class="sale-conditions">
            <h2>Conditions of Use:</h2>
            <h3>ARTICLE 1 : PREAMBULE </h3>
            <p>
                Le shop en ligne du site internet « Blackout Vinylstore» a été mis en place par Blackout Vinylstore qui
                en est l’exploitant. Toute commande validée par le client au sein du site implique l’acceptation
                préalable des présentes conditions générales.
                Les présentes conditions générales de vente s'appliquent de façon exclusive Tout internaute peut prendre
                connaissance des Conditions générales de vente sur le site Ces Conditions générales de vente pouvant
                faire l'objet de modifications, les conditions applicables sont celles en vigueur sur le Site à la date
                de passation de votre commande.
            </p>
            <h3>ARTICLE 2 : PRIX</h3>
            <p>
                Les prix de nos produits sont indiqués en euro toutes taxes comprises (T.T.C.) hors participation aux
                frais d’expédition. Les prix sont soumis à la T.V.A. française et tout changement du taux légal de cette
                T.V.A. sera implicitement répercuté sur le prix des produits présentés sur le site à la date stipulée
                par le décret d'application s'y référant.
                Pour les professionnels, En cas de commande vers un pays autre que la France métropolitaine vous êtes
                l'importateur du ou des produits concernés. Pour tous les produits expédiés hors Union Européenne et
                DOM-TOM, le prix sera calculé hors taxes automatiquement sur la facture. Des droits de douane ou autres
                taxes locales ou droits d'importation ou taxes d'Etat sont susceptibles d'être exigibles. Ces droits et
                sommes ne relèvent pas du ressort de Blackout Vinylstore. Ils seront à votre charge et relèvent de son
                entière responsabilité tant en termes de déclarations que de paiements aux autorités et/organismes
                compétents de votre pays. Nous vous conseillons de vous renseigner sur ces aspects auprès de vos
                autorités locales.
                Toutes les commandes quelle que soit leur origine sont payables en Euros toolboxrecords.com se réserve
                le droit de modifier ses prix à tout moment mais les produits seront facturés sur la base des tarifs en
                vigueur au moment de l'enregistrement des commandes, sous réserve de disponibilité.
                Les produits demeurent la propriété de toolboxrecords.com jusqu'au complet paiement du prix.

            </p>
            <h3>ARTICLE 3 : VALIDATION et PAIEMENT</h3>
            <p>
                3.1 - Vous déclarez avoir pris connaissance et accepté les présentes Conditions Générales de Vente avant
                la passation de votre commande. La validation de votre commande vaut donc acceptation de ces Conditions
                Générales de Vente.
                Sauf preuve contraire, les données enregistrées par Blackout Vnylstore constituent la preuve de
                l'ensemble des transactions passées par Blackout Vinylstore et ses clients.
                3.2 modes de paiement
                Pour régler sa commande, le client dispose à son choix, de l'ensemble des modes de paiement proposés
                lors de la validation finale du bon de commande, à savoir : carte bancaire, chèque, mandat cash et
                virement bancaire.

            </p>
            <h3>ARTICLE 4: DISPONIBILITE ET LIVRAISON</h3>
            <p>
                Nos offres de produits et prix sont valables tant qu’ils sont visibles sur le site, dans la limite des
                stocks disponibles.
                Nous vous informerons par email en cas d’indisponibilité d’un de nos produits après passation de votre
                commande.
                Les produits sont livrés à l'adresse de livraison que vous avez indiquée au cours du processus de
                commande. Les délais indiqués sont des délais moyens habituels et correspondent aux délais de traitement
                et de livraison.
                Le choix du mode de transport reviendra à blackout Vinylstore en fonction du poids et/ou du volume des
                produits. Blackout Vinylstore rappelle au consommateur qu'il est tenu de s'assurer avoir mentionné
                toutes les informations utiles à la livraison de sa commande.
                En cas de paiement par chèque, la commande sera traitée à réception du chèque. En conséquence, les
                délais applicables dans ce cas sont ceux au jour de réception du chèque et peuvent donc être modifiés
                par rapport à ceux mentionnés au jour de la passation de la commande.

            </p>
            <h3>ARTICLE 5 : Garanties et responsabilités</h3>
            <p>
                5.1 Garantie lié aux lois relative à la vente à distance :
                D’après la loi française, vous disposez d’un délai de 7 jours pour vous rétractez. A condition que le
                produit soit dans un parfait état, nous vous donnons la possibilité de nous retourner le ou les
                articles. Dans tous les cas, les frais de port du retour restent à la charge du client et ce retour fera
                l'objet d'un avoir du montant de la marchandise retournée. Vous bénéficiez des dispositions de la
                garantie légale des vices cachés.
                5.2 Garantie constructeurs
                L’ensemble des produits vendus sur le site qui donnent droit à une garantie constructeur généralement
                d’un an sera pris en compte par la société blackout vinylestore. En cas de panne pendant la période de
                la garantie constructeur vous pouvez contacter directement le service après-vente constructeur pour vous
                rapprocher de son centre agrée le plus proche de chez vous ou passer par notre service après-vente pour
                que nous faisions le relais entre lui et vous. Dans ce second cas il vous suffit de nous renvoyer le
                produit à vos frais en colissimo accompagné de votre facture d’achat et nous nous chargeons des autres
                démarches gratuitement à votre place.
                Attention la garantie peut varié en fonction de la date d’achat chez le constructeur, celle-ci sera
                signalé dans tous les cas sur la page produits.
                blackout vinylstore signale au consommateur que la majorité des fournisseurs imposent de conserver les
                emballages d'origines afin d'être couverts par la garantie.
                Dans le cas d'un produit défectueux durant la période de garantie, le consommateur est invité à prendre
                contact avec le service client qui lui indiquera la marche à suivre pour retourner son produit. Aucun
                retour ne sera accepté sans accord préalable matérialisé par l'émission d'un numéro et d'un bon d'accord
                de retour. Cet accord de retour est valable pour une durée de 8 jours ouvrés. A compter de son
                attribution, le produit défectueux devra être retourné à blackout vinylstore dans son emballage
                d'origine, complet (accessoires, coupon de garantie, notices, drivers, etc.), l'ensemble protégé par un
                sur emballage faisant mention de façon visible du numéro de retour communiqué par blackout vinylstore le
                bon de retour imprimé devant être joint dans le colis.

            </p>
            <h3>ARTICLE 6 : Mentions légales et clauses juridiques</h3>
            <p>
                Le présent contrat est soumis à la loi française.
                La langue du présent contrat est la langue française.
                En cas de litige les tribunaux Français seront seuls compétents.
                toolboxrecords.com s'engage à ne pas divulguer à des tiers les informations que vous lui communiquez.
                Celles-ci sont confidentielles. Elles ne seront utilisées que pour le traitement de votre commande et
                que pour renforcer et personnaliser la communication, notamment par les lettres d'informations
                auxquelles vous vous serez abonnés ainsi que dans le cadre de la personnalisation du site en fonction de
                vos centres d'intérêts.
                Vous disposez d'un droit d'accès, de rectification, et d'opposition aux données personnelles vous
                concernant.
                Pour cela il vous suffit de nous contacter

            </p>
